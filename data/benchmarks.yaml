# One entry per benchmark, grouped by domain. Fields: name, domain
# (General|Math|Physics|Chemistry|Materials|Biology|Agentic), subdomain,
# paper_title, arxiv_id (or null), paper_url, github ("owner/repo" or null),
# org, major_lab (bool), year, description. Stars are shown as a live shields.io
# badge; rows are sorted alphabetically by scripts/generate_readme.py.


