# LLM4Sci Benchmark - source of truth.
#
# One entry per benchmark, grouped by domain. Base fields: name, domain
# (General|Math|Physics|Chemistry|Materials|Biology|Agentic), subdomain,
# paper_title, arxiv_id (or null), paper_url, github ("owner/repo" or null),
# org, major_lab (bool), year, description. Optional dataset/eval fields (for
# the web app): hf_dataset, license, size, access, task_type, metrics,
# modality, leaderboard_url, homepage_url. README is generated by
# scripts/generate_readme.py; the web JSON by web/scripts/gen-data.mjs.


