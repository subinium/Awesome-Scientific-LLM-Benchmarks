# LLM4Sci Benchmark — source of truth.
#
# One entry per benchmark. A benchmark appears exactly once, under its most
# natural domain; cross-domain benchmarks (e.g. GPQA, OlympiadBench) live under
# "General". Fields:
#   name        short benchmark name (unique)
#   domain      General | Math | Physics | Chemistry | Materials | Biology | Agentic
#   subdomain   free-text tag
#   paper_title full paper title
#   arxiv_id    arXiv id used to crawl citations, or null
#   paper_url   canonical paper link (arXiv / OpenReview / journal / bioRxiv)
#   github      "owner/repo" or null
#   org         primary releasing organization
#   major_lab   true only for OpenAI / Google DeepMind / Anthropic / Meta /
#               Microsoft / Apple / Nvidia / xAI / Mistral
#   year        publication year
#   description one sentence on what it tests
#
# Stars and citations are NOT stored here — they are crawled into data/stats.json
# by scripts/update_stats.py.

