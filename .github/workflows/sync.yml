name: Sync generated files

# Keeps generated artifacts in sync with the single source of truth
# (data/benchmarks.yaml) so contributors only ever edit that one file.
#   - on push to main touching the data  -> regenerate README.md
#   - weekly (or manual)                  -> also refresh example rows from HF
on:
  push:
    branches: [main]
    paths:
      - "data/benchmarks.yaml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-generated
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml requests

      - name: Regenerate README from benchmarks.yaml
        run: python scripts/generate_readme.py

      - name: Refresh example rows from Hugging Face (scheduled / manual only)
        if: github.event_name != 'push'
        run: python scripts/fetch_examples.py

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/examples.json
          if git diff --staged --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "chore: sync generated files from benchmarks.yaml"
            git push
          fi
